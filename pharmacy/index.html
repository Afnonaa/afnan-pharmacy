<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أفنان</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Header -->
    <header>
        <div class="header-container">
            <div class="logo">
                <span class="logo-icon"><img src="logo/pharmacy.png" alt=""></span>
                <h1>أفنان</h1>
            </div>
            
            <div class="language-switch">
                <button onclick="switchLanguage()" id="lang-btn">EN</button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="container">
        <!-- Smart Search Bar -->
        <section class="search-section">
            <div class="search-bar">
                <input type="text" id="search-input" 
                placeholder="ابحث عن دواء... (مثال: Panadol أو بانادول)" 
                onkeyup="smartSearch()">
                <button onclick="smartSearch()">
                    <i class="fas fa-search"></i>
                </button>
            </div>
        </section>

        <!-- Categories Section -->
        <section class="categories">
            <h2 id="categories-title">الأقسام الرئيسية (Categories)</h2>
            
            <div class="category-grid">
                <div class="category-card">
                    <i class="fas fa-pills"></i>
                    <span id="meds">الأدوية (Medications)</span>
                </div>
                <div class="category-card">
                    <i class="fas fa-spa"></i>
                    <span id="skincare">العناية بالبشرة (Skin Care)</span>
                </div>
                <div class="category-card">
                    <i class="fas fa-baby"></i>
                    <span id="babycare">العناية بالأم والطفل (Baby Care)</span>
                </div>
                <div class="category-card">
                    <i class="fas fa-apple-alt"></i>
                    <span id="vitamins">الفيتامينات والمكملات الغذائية</span>
                </div>
                <div class="category-card">
                    <i class="fas fa-heartbeat"></i>
                    <span id="devices">الأجهزة الطبية (جهاز ضغط، سكر، إلخ)</span>
                </div>
            </div>
        </section>

        

    <!-- Quick Support >

        <!-- Product Cards -->
        <section class="products-section">
            <h2 id="products-title">منتجات مميزة</h2>
            <div class="products-grid" id="products-grid">
                <!-- يتم إضافتها بالجافا سكريبت -->
            </div>
        </section>
    </main>

    <!-- Floating WhatsApp Icon (التواصل السريع) -->
    <div class="floating-support">
        <a href="https://wa.me/20123456789" target="_blank" class="whatsapp-float" title="تواصل معنا عبر واتساب">
            <i class="fab fa-whatsapp"></i>
        </a>
    </div>

    <script src="script.js"></script>


        <!-- Product Cards Section -->
        <section class="products-section">
            <div class="products-grid" id="products-grid">
                <!-- Product cards will be added by JavaScript -->
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
